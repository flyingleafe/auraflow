<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AuraFlow live viz</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #0b0e14; color: #c9d1d9; }
    #view { position: fixed; inset: 0; }
    #hud { position: fixed; top: 0; left: 0; padding: 10px 14px;
      font-size: 12px; line-height: 1.5; pointer-events: none;
      text-shadow: 0 1px 2px #000; }
    #hud b { color: #f0f6fc; }
    #title { font-size: 14px; font-weight: 700; color: #58a6ff; }
    #dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%;
      background: #f85149; margin-right: 5px; vertical-align: baseline; }
    #dot.on { background: #3fb950; }
    #controls { position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; background: rgba(13,17,23,.82);
      border-top: 1px solid #21262d; font-size: 12px; }
    #controls button { font: inherit; color: #c9d1d9; cursor: pointer;
      background: #21262d; border: 1px solid #30363d; border-radius: 6px;
      padding: 4px 12px; }
    #controls button:hover { background: #30363d; }
    #scrub { flex: 1; accent-color: #58a6ff; }
    #chart { position: fixed; right: 10px; top: 10px;
      width: 320px; height: 130px; background: rgba(13,17,23,.7);
      border: 1px solid #21262d; border-radius: 8px; }
    .muted { color: #8b949e; }
  </style>
</head>
<body>
  <canvas id="view"></canvas>
  <canvas id="chart" width="640" height="260"></canvas>
  <div id="hud">
    <div id="title">AuraFlow</div>
    <div><span id="dot"></span><span id="status">connecting…</span></div>
    <div class="muted">t = <b id="t">–</b> s &nbsp; frame <b id="frame">0</b>
      &nbsp; buffered <b id="buf">0</b></div>
    <div class="muted" id="meta"></div>
  </div>
  <div id="controls">
    <button id="playpause">⏸ Pause</button>
    <button id="live">⏵ Live</button>
    <input id="scrub" type="range" min="0" max="0" value="0" />
    <span class="muted" id="scrublabel">live</span>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
